<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Gallery Page Specific Border - Add to css/style.css */
body.gallery-page #gallery,
body:has(#gallery) #gallery:not(.home-gallery) {
    position: relative !important;
    border: 3px solid rgba(255, 215, 0, 0.4) !important;
    border-radius: 20px !important;
    margin: 2rem auto !important;
    max-width: 1400px !important;
    overflow: hidden !important;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3) !important;
}

body.gallery-page #gallery::before,
body:has(#gallery) #gallery:not(.home-gallery)::before {
    content: '' !important;
    position: absolute !important;
    top: -3px !important;
    left: -3px !important;
    right: -3px !important;
    bottom: -3px !important;
    background: linear-gradient(45deg, #FFD700, #FFA500, #FFD700, #FFA500) !important;
    border-radius: 23px !important;
    z-index: -1 !important;
    animation: borderGlow 3s ease-in-out infinite alternate !important;
}

@keyframes borderGlow {
    0% { opacity: 0.6; transform: rotate(0deg); }
    100% { opacity: 1; transform: rotate(360deg); }
}

@media (max-width: 768px) {
    body.gallery-page #gallery {
        border-width: 2px !important;
        margin: 1rem !important;
        border-radius: 15px !important;
    }
}
        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        .filter-tab {
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: 2px solid rgba(255,215,0,0.5);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .filter-tab.active {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #2c1810;
            box-shadow: 0 8px 25px rgba(255,215,0,0.4);
            transform: translateY(-2px);
        }
        .filter-tab:hover:not(.active) {
            background: rgba(255,255,255,0.3);
            border-color: #FFD700;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }
        .gallery-item {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .gallery-item:hover {
            transform: scale(1.05);
        }
        .gallery-item img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.1);
        }
        .gallery-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: #fff;
            padding: 2rem 1.5rem 1.5rem;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .filter-tabs { gap: 0.5rem; }
            .filter-tab { padding: 10px 18px; font-size: 0.9rem; }
            .gallery-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
        }
        @media (max-width: 480px) {
            .gallery-grid { grid-template-columns: 1fr; }
        }
         body.gallery-page .hero {
        background-image: url('images/ahero.jpg');
    }
    </style>
</head>

<script src="js/script.js"></script>
<script>
    // Gallery Filter Functionality
    const filterTabs = document.querySelectorAll('.filter-tab');
    const galleryItems = document.querySelectorAll('.gallery-item');

    filterTabs.forEach(tab => {
        tab.addEventListener('click', () => {
            // Update active tab
            filterTabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');

            const filterValue = tab.getAttribute('data-filter');

            galleryItems.forEach(item => {
                const category = item.getAttribute('data-category');

                if (filterValue === 'all' || category === filterValue) {
                    item.style.display = 'block';
                    item.style.opacity = '1';
                    item.style.transform = 'scale(1)';
                } else {
                    item.style.display = 'none';
                    item.style.opacity = '0';
                    item.style.transform = 'scale(0.9)';
                }
            });
        });
    });
</script>
